version: '3.8'

services:

  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Harsh@9595
      MYSQL_DATABASE: fitness_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5


  fitness-app:
    image: fitness-mono:4.0
    container_name: fitness-app
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/fitness_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Harsh@9595

    volumes:
      - name-vol:/fitness-app

volumes:
  mysql-data:
  name-vol: